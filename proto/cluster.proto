syntax = "proto3";

// Orchestrator <-> worker control plane.
//
// Workers cannot reach Postgres; they only talk to the orchestrator. A worker
// dials the orchestrator and opens ONE long-lived `Connect` stream: it first
// announces its capacity (`Hello`), then the orchestrator pushes `JobRequest`s
// (one per free slot) and the worker streams back a `JobResult` per job.
//
// The analysis result rides as a JSON string (the existing serde form of
// `GameAnalysis`) so we don't re-model the whole result in protobuf — the
// orchestrator only needs a `serde_json::Value` to persist it.
package cluster;

service Cluster {
  // Bidirectional: client stream of WorkerMsg, server stream of JobRequest.
  // (Named `Session`, not `Connect`, to avoid clashing with tonic's generated
  // `ClusterClient::connect` channel constructor.)
  rpc Session(stream WorkerMsg) returns (stream JobRequest);
}

// Orchestrator -> worker: analyze this game.
message JobRequest {
  string job_id = 1; // the jobs-row id this work belongs to
  string sgf = 2;    // the SGF to analyze
}

// Worker -> orchestrator.
message WorkerMsg {
  oneof kind {
    Hello hello = 1;      // first message: announce capacity
    JobResult result = 2; // one per finished job
  }
}

// Capacity announcement (sent once, as the first message on the stream).
message Hello {
  uint32 slots = 1; // max concurrent jobs this worker will accept
}

// The outcome of one job. Exactly one of `analysis_json` / `error` is set.
message JobResult {
  string job_id = 1;
  oneof outcome {
    string analysis_json = 2; // serde_json of GameAnalysis (on success)
    string error = 3;         // engine/parse error message (on failure)
  }
}
