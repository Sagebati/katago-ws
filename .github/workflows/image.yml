# Build the katago-ws images and push them to GitHub Container Registry (ghcr.io),
# so a host can pull a ready image instead of building the Dockerfile itself —
# which it can't, because the build needs the sibling `muxa` + `pgmq` crates as a
# PARENT context (a one-repo clone doesn't have them).
#
# One Dockerfile, three KataGo binaries — built as a matrix, one image per
# backend (mirrors the `justfile` build-arg trios, the local source of truth):
#
#   :cpu     Eigen     — pure CPU, no GPU            (also tagged :latest)
#   :cuda    CUDA      — NVIDIA GPU (needs --gpus)
#   :opencl  OpenCL    — AMD/Intel/NVIDIA GPU (--device /dev/dri)
#
# Each is also tagged :<variant>-<commit-sha>. The CPU image is :latest because
# it runs anywhere (no GPU runtime required).
name: image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Don't cancel the other backends if one fails to build.
      fail-fast: false
      matrix:
        include:
          # CPU (Eigen) — pure Debian, no GPU. Tagged :latest.
          - variant: cpu
            base: debian:bookworm-slim
            zip: katago-v1.16.5-eigen-linux-x64.zip
            pkgs: ca-certificates
          # NVIDIA CUDA. Base + KataGo build agree on CUDA/cuDNN versions.
          - variant: cuda
            base: nvidia/cuda:12.8.0-cudnn-runtime-ubuntu24.04
            zip: katago-v1.16.5-cuda12.8-cudnn9.8.0-linux-x64.zip
            pkgs: ca-certificates
          # OpenCL — AMD/Intel/NVIDIA GPUs via the Mesa rusticl ICD.
          - variant: opencl
            base: debian:bookworm-slim
            zip: katago-v1.16.5-opencl-linux-x64.zip
            pkgs: ca-certificates ocl-icd-libopencl1 mesa-opencl-icd clinfo
    steps:
      - name: Free runner disk (image bundles KataGo + a model + a release build)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      - name: Checkout katago-ws
        uses: actions/checkout@v4
        with:
          path: katago-ws

      - name: Checkout muxa (sibling build-context crate)
        uses: actions/checkout@v4
        with:
          repository: Sagebati/muxa
          ref: main
          path: muxa

      - name: Checkout pgmq fork (sibling crate, pinned to muxa's git rev)
        uses: actions/checkout@v4
        with:
          repository: Sagebati/pgmq
          ref: e243a26a60a0c3a43eefca2051156556715e875e
          path: pgmq

      - name: Scope the Docker build context
        run: |
          cat > "$GITHUB_WORKSPACE/.dockerignore" <<'EOF'
          **/.git
          **/target
          **/node_modules
          **/.wrangler
          **/.idea
          EOF

      - name: Set up Buildx (gha layer cache needs the container driver)
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose image tags (always :<variant> + :<variant>-<sha>; cpu also :latest)
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/sagebati/katago-ws:${{ matrix.variant }}"
            echo "ghcr.io/sagebati/katago-ws:${{ matrix.variant }}-${{ github.sha }}"
            if [ "${{ matrix.variant }}" = "cpu" ]; then
              echo "ghcr.io/sagebati/katago-ws:latest"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build + push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: katago-ws/Dockerfile
          push: true
          build-args: |
            RUNTIME_BASE=${{ matrix.base }}
            KATAGO_ZIP=${{ matrix.zip }}
            RUNTIME_PKGS=${{ matrix.pkgs }}
          tags: ${{ steps.tags.outputs.tags }}
          # Per-variant scope: the heavy (and identical) Rust builder stage is
          # reused run-over-run without the three concurrent jobs racing on one
          # cache key.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
