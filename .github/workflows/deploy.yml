# Auto-deploy katago-ws to Cloudflare on every push to `main`.
#
# Why a GitHub Action and not Cloudflare's native "Workers Builds":
#   - Workers Builds' build environment has no Docker daemon, so it can't build
#     our container image from the Dockerfile (it expects a pre-pushed image).
#   - The Dockerfile needs the sibling `muxa` + `pgmq` crates as a PARENT build
#     context, which a single-repo checkout there can't provide.
# GitHub's runners DO have Docker, so we build+push the image and deploy the
# Worker here, in one job. `wrangler deploy` (with `image: ../../Dockerfile`)
# builds the image, pushes it to the Cloudflare registry, and rolls out the Worker.
#
# Build layout: the three repos are checked out as SIBLINGS under the workspace
# root (katago-ws/, muxa/, pgmq/) so the wrangler config's parent build context
# (`image_build_context: "../../.."`) resolves exactly as it does locally.
#
# Required repo secret:
#   CLOUDFLARE_API_TOKEN — a Cloudflare API token with permissions to edit Workers
#   and push container images (the "Edit Cloudflare Workers" template covers it,
#   plus Account › Workers Scripts:Edit and Workers/Containers image push).
# The Worker's runtime secret (MUXA_DATABASE_URL) is set once via `wrangler secret
# put` and persists across deploys — it is NOT needed here.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy per branch at a time; a newer push cancels an in-flight build.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Account id is not a secret; pin it so wrangler never has to guess.
      CLOUDFLARE_ACCOUNT_ID: d1b05ead202bf6e9dac41826de39b34b
    steps:
      - name: Free runner disk (image bundles KataGo + a model + a release build)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - name: Checkout katago-ws
        uses: actions/checkout@v4
        with:
          path: katago-ws

      - name: Checkout muxa (sibling build-context crate)
        uses: actions/checkout@v4
        with:
          repository: Sagebati/muxa
          ref: main
          path: muxa

      - name: Checkout pgmq fork (sibling crate, pinned to muxa's git rev)
        uses: actions/checkout@v4
        with:
          repository: Sagebati/pgmq
          ref: e243a26a60a0c3a43eefca2051156556715e875e
          path: pgmq

      - name: Scope the Docker build context (no .git/target/node_modules)
        run: |
          cat > "$GITHUB_WORKSPACE/.dockerignore" <<'EOF'
          **/.git
          **/target
          **/node_modules
          **/.wrangler
          **/.idea
          EOF

      - name: Set up Node (wrangler + the Worker glue)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Worker deps
        working-directory: katago-ws/deploy/cloudflare
        run: npm ci

      - name: Deploy (build + push image, then roll out the Worker)
        working-directory: katago-ws/deploy/cloudflare
        run: npx wrangler deploy
